<style>
body { margin:0; padding:0; }
#map { width:100vw; height:100vh; }

/* Greyscale OSM tiles */
.leaflet-tile-pane {
  filter: grayscale(100%) brightness(1.08);
  -webkit-filter: grayscale(100%) brightness(1.08);
}
body.satellite .leaflet-tile-pane {
  filter: none;
  -webkit-filter: none;
}

.legend {
  background:#fff;
  padding:10px 14px;
  border-radius:6px;
  box-shadow:0 1px 5px rgba(0,0,0,0.3);
  font:12px/1.8 sans-serif;
  min-width:180px;
}
.legend h4 { margin:0 0 4px; font-size:13px; }
.legend hr { border:none; border-top:1px solid #ddd; margin:5px 0; }
.swatch { display:inline-block; width:12px; height:12px; border-radius:2px; vertical-align:middle; margin-right:4px; }

.ctip {
  background:rgba(255,255,255,0.85);
  border:none !important;
  box-shadow:none !important;
  font-size:10px;
  color:#3a5a3a;
  padding:1px 4px;
  border-radius:2px;
}

/* ── Draw panel ──────────────────────────────────────────────────────────── */
#draw-panel {
  position:fixed;
  bottom:20px;
  left:10px;
  width:310px;
  max-height:44vh;
  background:#fff;
  border-radius:8px;
  box-shadow:0 2px 12px rgba(0,0,0,0.28);
  font:12px/1.5 sans-serif;
  z-index:1000;
  display:flex;
  flex-direction:column;
}
#draw-panel-hdr {
  background:#1d3461;
  color:#fff;
  padding:7px 12px;
  border-radius:8px 8px 0 0;
  font-size:12px;
  font-weight:bold;
  letter-spacing:.3px;
}
#draw-panel-body {
  padding:8px 10px 4px;
  overflow-y:auto;
  flex:1;
}
#draw-status {
  color:#555;
  font-size:11px;
  margin-bottom:5px;
}
#draw-shapes { margin-bottom:6px; }
.draw-shape-row {
  display:flex;
  align-items:center;
  gap:4px;
  margin-bottom:3px;
}
.draw-shape-row input[type=text] {
  flex:1;
  font-size:11px;
  padding:2px 5px;
  border:1px solid #ccc;
  border-radius:3px;
}
.draw-shape-row span {
  font-size:10px;
  color:#888;
  white-space:nowrap;
}
.draw-shape-del {
  background:#c0392b;
  color:#fff;
  border:none;
  border-radius:3px;
  cursor:pointer;
  font-size:12px;
  padding:0 5px;
  line-height:1.6;
}
#draw-coords {
  width:100%;
  height:88px;
  font:9.5px/1.3 monospace;
  border:1px solid #ddd;
  border-radius:4px;
  padding:4px;
  resize:vertical;
  box-sizing:border-box;
  color:#333;
}
#draw-panel-ftr {
  padding:5px 10px 8px;
  display:flex;
  gap:5px;
}
.draw-btn {
  flex:1;
  padding:5px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:11px;
  font-weight:bold;
}
#btn-copy-draw { background:#27ae60; color:#fff; }
#btn-copy-draw:hover { background:#1e8449; }
#btn-clear-draw { background:#7f8c8d; color:#fff; }
#btn-clear-draw:hover { background:#616a6b; }

/* ── Design notes sidebar ─────────────────────────────────────────────────── */
#notes-toggle {
  position:fixed;
  top:50%;
  left:0;
  transform:translateY(-50%);
  z-index:1002;
  background:#1d3461;
  color:#fff;
  border:none;
  border-radius:0 6px 6px 0;
  cursor:pointer;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  padding:14px 7px;
  font:bold 11px/1.2 sans-serif;
  letter-spacing:.5px;
  box-shadow:2px 0 8px rgba(0,0,0,0.25);
  transition:left .25s;
}
#notes-toggle:hover { background:#253f78; }
#notes-panel {
  position:fixed;
  top:0; left:0; bottom:0;
  width:300px;
  background:#fff;
  border-right:2px solid #1d3461;
  box-shadow:3px 0 16px rgba(0,0,0,0.18);
  z-index:1001;
  display:flex;
  flex-direction:column;
  transform:translateX(-302px);
  transition:transform .25s;
}
#notes-panel.open { transform:translateX(0); }
#notes-panel.open ~ #notes-toggle { left:300px; }
#notes-hdr {
  background:#1d3461;
  color:#fff;
  padding:10px 14px;
  font:bold 13px/1.4 sans-serif;
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:0;
}
#notes-hdr-title { flex:1; }
#notes-hdr-close {
  background:rgba(255,255,255,0.2);
  color:#fff;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:13px;
  padding:1px 6px;
  line-height:1.6;
}
#notes-hdr-close:hover { background:rgba(255,255,255,0.38); }
#notes-feature-name {
  padding:8px 14px 4px;
  font:bold 12px/1.4 sans-serif;
  color:#1d3461;
  border-bottom:1px solid #e8edf5;
  flex-shrink:0;
  min-height:32px;
}
#notes-feature-name small { font-weight:normal; color:#888; }
#notes-body {
  flex:1;
  overflow-y:auto;
  padding:10px 14px;
  font:13px/1.65 sans-serif;
  color:#333;
}
#notes-body.empty { color:#aaa; font-style:italic; }
#notes-edit-bar {
  padding:6px 10px;
  border-top:1px solid #eee;
  display:flex;
  gap:5px;
  flex-shrink:0;
}
#notes-textarea {
  width:100%;
  min-height:100px;
  font:12px/1.5 sans-serif;
  border:1px solid #ccc;
  border-radius:4px;
  padding:6px;
  resize:vertical;
  box-sizing:border-box;
  display:none;
}
#notes-editing #notes-body { display:none; }
#notes-editing #notes-textarea { display:block; }
.notes-btn {
  flex:1;
  padding:5px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:11px;
  font-weight:bold;
}
#btn-notes-edit   { background:#2980b9; color:#fff; }
#btn-notes-edit:hover { background:#2070a0; }
#btn-notes-save   { background:#27ae60; color:#fff; display:none; }
#btn-notes-save:hover { background:#1e8449; }
#btn-notes-cancel { background:#7f8c8d; color:#fff; display:none; }
#btn-notes-cancel:hover { background:#616a6b; }

/* ── Elevation profile panel ──────────────────────────────────────────────── */
#prof-panel {
  position:fixed;
  bottom:0; left:0; right:0;
  height:210px;
  background:#fff;
  border-top:2px solid #2c5f2e;
  box-shadow:0 -3px 16px rgba(0,0,0,0.20);
  z-index:1001;
  display:none;
  flex-direction:column;
}
#prof-hdr {
  background:#2c5f2e;
  color:#fff;
  padding:5px 12px;
  font:bold 12px/1.6 sans-serif;
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
#prof-hdr-title { flex:1; }
.prof-hdr-btn {
  background:rgba(255,255,255,0.2);
  color:#fff;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:11px;
  padding:2px 8px;
}
.prof-hdr-btn:hover { background:rgba(255,255,255,0.38); }
#prof-body {
  flex:1;
  display:flex;
  overflow:hidden;
  min-height:0;
}
#prof-canvas { display:block; flex:1; min-width:0; }
#prof-stats {
  width:145px;
  flex-shrink:0;
  padding:8px 11px;
  font:11px/1.85 sans-serif;
  color:#333;
  border-left:1px solid #eee;
  overflow:hidden;
}
#prof-stats b { color:#2c5f2e; }
#prof-status {
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(44,95,46,0.92);
  color:#fff;
  padding:6px 18px;
  border-radius:20px;
  font:12px sans-serif;
  z-index:10002;
  display:none;
  pointer-events:none;
  white-space:nowrap;
}
#prof-crosshair {
  position:absolute;
  top:0; bottom:0;
  width:1px;
  background:rgba(44,95,46,0.6);
  pointer-events:none;
  display:none;
}
#prof-tip {
  position:absolute;
  background:rgba(255,255,255,0.93);
  border:1px solid #bbb;
  border-radius:3px;
  font:11px sans-serif;
  padding:2px 6px;
  pointer-events:none;
  display:none;
  white-space:nowrap;
}
/* ── Elevation editor panel ──────────────────────────────────────────────────── */
#edit-panel {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#fff; border:1px solid #bbb; border-radius:6px;
  box-shadow:0 3px 14px rgba(0,0,0,0.22); z-index:1200;
  display:none; min-width:310px; font-size:13px;
}
#edit-hdr {
  background:#2c5f2e; color:#fff; padding:8px 12px;
  border-radius:5px 5px 0 0; display:flex; justify-content:space-between; align-items:center; font-weight:bold;
}
#edit-hdr button { background:none; border:none; color:#fff; cursor:pointer; font-size:13px; opacity:0.85; }
#edit-hdr button:hover { opacity:1; }
#edit-body { padding:11px 14px 13px; }
#edit-mode-btns { display:flex; gap:7px; margin-bottom:9px; }
.emb { flex:1; padding:6px 0; border:1px solid #ccc; border-radius:4px; cursor:pointer; background:#f5f5f5; font-size:13px; font-weight:bold; }
.emb.active { background:#2c5f2e; color:#fff; border-color:#2c5f2e; }
.edit-row { display:flex; align-items:center; gap:8px; margin:6px 0; }
.edit-row label { min-width:68px; color:#555; }
.edit-row input[type=range] { flex:1; }
.edit-val { min-width:44px; text-align:right; font-weight:bold; color:#333; }
#edit-cursor-row { color:#666; font-size:12px; margin:7px 0 9px; }
#edit-action-row { display:flex; gap:8px; }
#edit-action-row button { flex:1; padding:6px 0; border:1px solid #bbb; border-radius:4px; cursor:pointer; background:#f0f0f0; font-size:12px; }
#edit-action-row button:hover { background:#e0e0e0; }

#notes-feature-img { display:none; padding:8px 10px 10px; border-top:1px solid #ddd; }
#notes-feature-img img { width:100%; border-radius:4px; display:block; cursor:zoom-in; }
#notes-feature-img img:hover { opacity:0.9; }
#notes-feature-img .img-caption {
  font-size:10px; color:#777; text-align:center; margin-top:4px; font-style:italic;
}
#img-lightbox {
  display:none; position:fixed; inset:0; z-index:9999;
  background:rgba(0,0,0,0.87);
  align-items:center; justify-content:center; cursor:zoom-out;
}
#img-lightbox.open { display:flex; }
#img-lightbox-inner { position:relative; max-width:92vw; }
#img-lightbox-el { max-width:92vw; max-height:88vh; border-radius:6px; box-shadow:0 4px 40px rgba(0,0,0,0.8); display:block; }
#img-lightbox-cap { margin-top:8px; color:#bbb; font-size:13px; font-style:italic; text-align:center; }
#img-lightbox-close {
  position:absolute; top:-14px; right:-14px;
  width:28px; height:28px; border-radius:50%;
  background:#fff; border:none; font-size:16px; line-height:28px;
  text-align:center; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,0.4);
}
#edit-export-btn { background:#e8f5e9 !important; border-color:#2c5f2e !important; color:#2c5f2e !important; font-weight:bold; }
#edit-export-btn:hover { background:#c8e6c9 !important; }
#edit-rebuild-btn { background:#e3f2fd !important; border-color:#1565c0 !important; color:#1565c0 !important; font-weight:bold; }
#edit-rebuild-btn:hover { background:#bbdefb !important; }
#elev-tooltip { position:fixed; pointer-events:none; background:rgba(0,0,0,0.62);
  color:#fff; font-size:12px; font-family:monospace; padding:3px 7px;
  border-radius:4px; white-space:nowrap; display:none; z-index:2000; }
</style>
</head>
<body>
<div id="map"></div>
<div id="draw-panel">
  <div id="draw-panel-hdr">&#9998; Draw Fairway Shapes</div>
  <div id="draw-panel-body">
    <div id="draw-status">Use the polygon tool (top-left toolbar) to draw shapes on the map.</div>
    <div id="draw-shapes"></div>
    <textarea id="draw-coords" placeholder="GeoJSON coordinates will appear here after drawing…" readonly></textarea>
  </div>
  <div id="draw-panel-ftr">
    <button class="draw-btn" id="btn-copy-draw" onclick="copyDrawnJSON()">Copy JSON</button>
    <button class="draw-btn" id="btn-clear-draw" onclick="clearAllDrawn()">Clear All</button>
  </div>
</div>

<div id="notes-panel">
  <div id="notes-hdr">
    <span id="notes-hdr-title">&#128221; Design Notes</span>
    <button id="notes-hdr-close" onclick="closeNotes()" title="Close panel">&#10005;</button>
  </div>
  <div id="notes-feature-name"><small>Click any feature on the map to see notes</small></div>
  <textarea id="notes-textarea" placeholder="Type notes for this feature here…"></textarea>
  <div id="notes-body" class="empty">No notes yet for this feature.</div>
  <div id="notes-edit-bar">
    <button class="notes-btn" id="btn-notes-edit"   onclick="startEditNote()">&#9998; Edit</button>
    <button class="notes-btn" id="btn-notes-save"   onclick="saveNote()">&#10003; Save</button>
    <button class="notes-btn" id="btn-notes-cancel" onclick="cancelEditNote()">Cancel</button>
  </div>
  <div id="notes-feature-img">
    <img id="notes-feature-img-el" src="" alt="Feature view" onclick="openImageLightbox()" title="Click to enlarge">
    <div class="img-caption" id="notes-feature-img-cap"></div>
  </div>
</div>
<button id="notes-toggle" onclick="toggleNotes()" title="Toggle design notes">Design Notes</button>

<div id="prof-status"></div>
<div id="prof-panel">
  <div id="prof-hdr">
    <span id="prof-hdr-title">&#9968; Elevation Profile</span>
    <button class="prof-hdr-btn" onclick="startProfile()">New profile</button>
    <button class="prof-hdr-btn" onclick="closeProfilePanel()">&#10005; Close</button>
  </div>
  <div id="prof-body">
    <div style="position:relative;flex:1;min-width:0;overflow:hidden">
      <canvas id="prof-canvas"></canvas>
      <div id="prof-crosshair"></div>
      <div id="prof-tip"></div>
    </div>
    <div id="prof-stats">&#8212;</div>
  </div>
</div>

<div id="edit-panel">
  <div id="edit-hdr">
    <span>&#9650;&#9660; Edit Elevation</span>
    <button onclick="_stopElevEdit()">&#10005; Close</button>
  </div>
  <div id="edit-body">
    <div id="edit-mode-btns">
      <button id="emb-raise" class="emb active" onclick="_setEditMode(true)">&#9650; Raise</button>
      <button id="emb-lower" class="emb" onclick="_setEditMode(false)">&#9660; Lower</button>
    </div>
    <div class="edit-row">
      <label>Amount</label>
      <input type="range" id="edit-amount-sl" min="0.5" max="8" step="0.5" value="2"
        oninput="_editAmount=parseFloat(this.value);document.getElementById('edit-amount-val').textContent=this.value">
      <span class="edit-val"><span id="edit-amount-val">2</span>&thinsp;m</span>
    </div>
    <div class="edit-row">
      <label>Radius</label>
      <input type="range" id="edit-radius-sl" min="15" max="120" step="5" value="40"
        oninput="_editRadius=parseFloat(this.value);document.getElementById('edit-radius-val').textContent=this.value">
      <span class="edit-val"><span id="edit-radius-val">40</span>&thinsp;m</span>
    </div>
    <div id="edit-cursor-row">Cursor: <strong id="edit-cursor-elev">&#8212;</strong></div>
    <div id="edit-action-row">
      <button onclick="_undoElevEdit()">&#8617; Undo</button>
      <button id="edit-rebuild-btn" onclick="_rebuildContourLayer()">&#8635; Rebuild contours</button>
      <button id="edit-export-btn" onclick="_exportElevGrid()">&#11015; Export grid</button>
    </div>
  </div>
</div>

function haversineM(p1, p2) {
  var R = 6371000;
  var phi1 = p1[0]*Math.PI/180, phi2 = p2[0]*Math.PI/180;
  var dphi = (p2[0]-p1[0])*Math.PI/180;
  var dlam = (p2[1]-p1[1])*Math.PI/180;
  var a = Math.sin(dphi/2)*Math.sin(dphi/2) +
          Math.cos(phi1)*Math.cos(phi2)*Math.sin(dlam/2)*Math.sin(dlam/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function routeMid(a, b) { return [(a[0]+b[0])/2, (a[1]+b[1])/2]; }

      className: '',

            'font:bold 11px/1.5 sans-serif;padding:2px 7px;border-radius:4px;'+
            'box-shadow:0 1px 4px rgba(0,0,0,0.25);border:1px solid '+color+';'+

// ── H7 Shot Dispersion Cone ───────────────────────────────────────────────────
var dispersionLayer = L.layerGroup();

(function () {
  var TEE     = [-37.969972, 145.050500];
  var WP      = [-37.968306, 145.050139];
  var cos_lat = Math.cos(TEE[0] * Math.PI / 180);

  // Bearing from tee toward waypoint (radians, clockwise from north)
  var dlat_m = (WP[0] - TEE[0]) * 111000;
  var dlon_m = (WP[1] - TEE[1]) * 111000 * cos_lat;
  var brg    = Math.atan2(dlon_m, dlat_m);   // atan2(east, north) → clockwise-from-north

  // Return a Leaflet [lat,lon] point at dist_m from TEE along (brg + offset_deg)
  function pt(dist_m, offset_deg) {
    var a = brg + offset_deg * Math.PI / 180;
    return [
      TEE[0] + dist_m * Math.cos(a) / 111000,
      TEE[1] + dist_m * Math.sin(a) / (111000 * cos_lat)
    ];
  }

  // Dispersion model: half-width at distance d = d × k
  //   1σ ≈ 10 % of carry → half-angle₁ = atan(0.10) ≈ 5.7°
  //   2σ ≈ 20 % of carry → half-angle₂ = atan(0.20) ≈ 11.3°
  var HA1 = Math.atan(0.10) * 180 / Math.PI;
  var HA2 = Math.atan(0.20) * 180 / Math.PI;
  var MAX_D = 250;
  var N_EDGE = 60;

  function coneRing(half_deg) {
    var left = [], right = [];
    for (var i = 0; i <= N_EDGE; i++) {
      var d = MAX_D * i / N_EDGE;
      left.push(pt(d, -half_deg));
      right.push(pt(d,  half_deg));
    }
    return left.concat(right.slice().reverse());
  }

  // Outer zone: ±2σ (95 % of shots)
  L.polygon(coneRing(HA2), {
    color: '#b83010', weight: 1.5, dashArray: '6 4',
    fillColor: '#e04818', fillOpacity: 0.10,
    interactive: false
  }).addTo(dispersionLayer);

  // Inner zone: ±1σ (68 % of shots) — darker overlay on top
  L.polygon(coneRing(HA1), {
    color: 'none', weight: 0,
    fillColor: '#e04818', fillOpacity: 0.14,
    interactive: false
  }).addTo(dispersionLayer);

  // Centre-line (aim direction)
  L.polyline([TEE, pt(MAX_D, 0)], {
    color: '#b83010', weight: 1, opacity: 0.35,
    dashArray: '2 7', interactive: false
  }).addTo(dispersionLayer);

  // Arc lines at 150 m, 200 m, 250 m — true circular arcs centred on tee
  [150, 200, 250].forEach(function (d) {
    var arcPts = [];
    for (var j = 0; j <= 50; j++) {
      arcPts.push(pt(d, -HA2 + 2 * HA2 * j / 50));
    }
    L.polyline(arcPts, {
      color: '#b83010', weight: 1.5, opacity: 0.70,
      interactive: false
    }).addTo(dispersionLayer);

    // Label just outside the right edge of the outer cone
    L.marker(pt(d, HA2 + 2.0), {
      icon: L.divIcon({
        className: '',
        html: '<div style="font:bold 10px/1.4 sans-serif;color:#a02808;' +
              'background:rgba(255,255,255,0.88);padding:1px 5px;' +
              'border-radius:3px;white-space:nowrap;' +
              'border:1px solid rgba(160,40,8,0.25)">' + d + ' m</div>',
        iconAnchor: [0, 8]
      }),
      interactive: false
    }).addTo(dispersionLayer);
  });

  // Label at the tee
  L.marker(TEE, {
    icon: L.divIcon({
      className: '',
      html: '<div style="font:bold 9px/1.3 sans-serif;color:#a02808;' +
            'background:rgba(255,255,255,0.88);padding:1px 5px;' +
            'border-radius:3px;white-space:nowrap;margin-top:4px">' +
            'H7 Tee<br><span style="font-weight:normal">~10% lateral / σ</span></div>',
      iconAnchor: [20, -4]
    }),
    interactive: false
  }).addTo(dispersionLayer);

})();

var drawnShapes = [];
var shapeCounter = 0;

map.on(L.Draw.Event.CREATED, function(e) {
  var layer = e.layer;
  drawnItems.addLayer(layer);
  shapeCounter++;
  var id = shapeCounter;
  var geojson = layer.toGeoJSON();
  geojson.properties.name = 'Shape ' + id;
  drawnShapes.push({ id: id, name: 'Shape ' + id, layer: layer, geojson: geojson });
  refreshDrawPanel();
});

function deleteShape(id) {
  var idx = -1;
  for (var i = 0; i < drawnShapes.length; i++) {
    if (drawnShapes[i].id === id) { idx = i; break; }
  }
  if (idx === -1) return;
  drawnItems.removeLayer(drawnShapes[idx].layer);
  drawnShapes.splice(idx, 1);
  refreshDrawPanel();
}

function clearAllDrawn() {
  drawnItems.clearLayers();
  drawnShapes = [];
  refreshDrawPanel();
}

function refreshDrawPanel() {
  var shapesDiv = document.getElementById('draw-shapes');
  var status    = document.getElementById('draw-status');
  var textarea  = document.getElementById('draw-coords');

  if (drawnShapes.length === 0) {
    status.textContent = 'Use the polygon tool (top-left toolbar) to draw shapes on the map.';
    shapesDiv.innerHTML = '';
    textarea.value = '';
    return;
  }

  status.textContent = drawnShapes.length + ' shape' + (drawnShapes.length > 1 ? 's' : '') + ' drawn. Name each shape, then Copy JSON.';
  shapesDiv.innerHTML = '';

  drawnShapes.forEach(function(s) {
    var row = document.createElement('div');
    row.className = 'draw-shape-row';

    var inp = document.createElement('input');
    inp.type = 'text';
    inp.value = s.name;
    inp.placeholder = 'Shape name (e.g. H6 Fairway)';
    (function(shape, input) {
      input.addEventListener('input', function() {
        shape.name = input.value;
        shape.geojson.properties.name = input.value;
        updateDrawTextarea();
      });
    })(s, inp);

    var pts = document.createElement('span');
    pts.textContent = (s.geojson.geometry.coordinates[0].length - 1) + ' pts';

    var del = document.createElement('button');
    del.className = 'draw-shape-del';
    del.textContent = '×';
    del.title = 'Delete this shape';
    (function(sid) {
      del.addEventListener('click', function() { deleteShape(sid); });
    })(s.id);

    row.appendChild(inp);
    row.appendChild(pts);
    row.appendChild(del);
    shapesDiv.appendChild(row);
  });

  updateDrawTextarea();
}

function updateDrawTextarea() {
  var fc = {
    type: 'FeatureCollection',
    features: drawnShapes.map(function(s) { return s.geojson; })
  };
  document.getElementById('draw-coords').value = JSON.stringify(fc, null, 2);
}

function copyDrawnJSON() {
  var textarea = document.getElementById('draw-coords');
  if (!textarea.value) return;
  var btn = document.getElementById('btn-copy-draw');
  function flash() {
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy JSON'; }, 2000);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(textarea.value).then(flash).catch(function() {
      textarea.select(); document.execCommand('copy'); flash();
    });
  } else {
    textarea.select(); document.execCommand('copy'); flash();
  }
}

  'H6 Runoff Area - tree clearing required':
    '• Clearing the trees currently on the right-hand side of the existing H7 tee creates a runoff area that feeds balls to the right, towards the existing H5 fairway. From there, you have to hit past the tree short-right of the new H6 green.\n' +
    '\n' +
    '• The area around the existing H7 tee becomes the primary landing spot for the approach to the new H6 green — it needs to be wide enough to offer a safe target for a lay-up.\n' +
    '\n' +

    '• Green located at the top of the existing hill. There are actually two tiers on the hill right now that could be retained in the final green construction. You could also make this green so there\'s a bit of a slope to hit into with a wedge, but you could have tee positions on the top or bottom tier?\n' +
    '\n' +
    '• The steep drop-offs to the north and east should roll a ball well down the hill if you miss long or right — this is meant to encourage you not to hit driver (think of the runoffs at 10 or 14 at St Andrews Links).\n' +

function noteKey(f) {
  var p = f.properties;
  if (p.label) return 'note:' + p.label;
  if (p.golf)  return 'note:' + (p.golf) + ':' + (p.hole || '?') + ':' + (p.name || '');
  return 'note:unknown';
}

var _currentNoteFeature = null;

function openNotesForFeature(f) {
  _currentNoteFeature = f;
  var panel = document.getElementById('notes-panel');
  panel.classList.add('open');

  // Feature title
  var p = f.properties;
  var nameEl = document.getElementById('notes-feature-name');
  if (p.label) {
    var holeStr = p.hole ? ' &mdash; Hole ' + p.hole : '';
    nameEl.innerHTML = p.label + holeStr;
  } else if (p.golf) {
    var g = p.golf; var label = g.charAt(0).toUpperCase() + g.slice(1);
    var hStr = p.hole ? ' &mdash; Hole ' + p.hole : '';
    nameEl.innerHTML = 'Current ' + label + hStr + (p.name ? '<br><small>' + p.name + '</small>' : '');
  } else {
    nameEl.innerHTML = 'Unknown feature';
  }

  // Load note
  var key = noteKey(f);
  var stored = localStorage.getItem(key);
  var note = stored !== null ? stored : (FEATURE_NOTES[p.label] || FEATURE_NOTES[key] || '');
  var bodyEl = document.getElementById('notes-body');
  if (note) {
    bodyEl.classList.remove('empty');
    bodyEl.innerHTML = note.replace(/\n/g, '<br>');
  } else {
    bodyEl.classList.add('empty');
    bodyEl.innerHTML = 'No notes yet for this feature.';
  }


  // Feature image (e.g. view from tee)
  var imgWrap = document.getElementById('notes-feature-img');
  var imgKey  = p.label || '';
  if (_featureImages[imgKey]) {
    document.getElementById('notes-feature-img-el').src = _featureImages[imgKey].src;
    document.getElementById('notes-feature-img-cap').textContent = _featureImages[imgKey].caption || '';
    imgWrap.style.display = 'block';
  } else {
    imgWrap.style.display = 'none';
    document.getElementById('notes-feature-img-el').src = '';
  }
  // Ensure not in edit mode
  cancelEditNote();
}

function toggleNotes() {

function startEditNote() {

function saveNote() {

// ── Elevation profile tool ─────────────────────────────────────────────────

function sampleElev(lat, lon) {
  if (typeof elevGrid === 'undefined') return NaN;
  var g = elevGrid;
  if (lat < g.minLat || lat > g.maxLat || lon < g.minLon || lon > g.maxLon) return NaN;
  var row = (g.maxLat - lat) / (g.maxLat - g.minLat) * (g.rows - 1);
  var col = (lon - g.minLon) / (g.maxLon - g.minLon) * (g.cols - 1);
  row = Math.max(0, Math.min(g.rows - 1, row));
  col = Math.max(0, Math.min(g.cols - 1, col));
  var r0 = Math.floor(row), r1 = Math.min(r0 + 1, g.rows - 1);
  var c0 = Math.floor(col), c1 = Math.min(c0 + 1, g.cols - 1);
  var fr = row - r0, fc = col - c0;
  var e00 = g.data[r0][c0], e01 = g.data[r0][c1];
  var e10 = g.data[r1][c0], e11 = g.data[r1][c1];
  if (e00 == null || e01 == null || e10 == null || e11 == null) return NaN;
  return e00*(1-fr)*(1-fc) + e01*(1-fr)*fc + e10*fr*(1-fc) + e11*fr*fc;
}

var _profMode = 0;   // 0=off, 1=waiting for pt1, 2=waiting for pt2
var _profPt1 = null;
var _profMarker1 = null;
var _profSamples = null;

var ProfControl = L.Control.extend({
  options: { position: 'topleft' },
  onAdd: function() {
    var btn = L.DomUtil.create('a', 'leaflet-bar-part');
    btn.id = 'prof-ctrl-btn';

    btn.innerHTML = '&#9968;';
    L.DomEvent.on(btn, 'click', L.DomEvent.stopPropagation)
              .on(btn, 'click', L.DomEvent.preventDefault)
              .on(btn, 'click', function() {
                if (_profMode > 0) { _cancelProfile(); } else { startProfile(); }
              });
    var bar = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
    bar.appendChild(btn);
    return bar;
  }
});
new ProfControl().addTo(map);

function _showStatus(msg) {
  var el = document.getElementById('prof-status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function startProfile() {
  _cancelProfile();
  _profMode = 1;

}

function _cancelProfile() {

function closeProfilePanel() {

map.on('mousemove', function(e) {
  var elev = sampleElev(e.latlng.lat, e.latlng.lng);
  var elevStr = isNaN(elev) ? 'no data' : elev.toFixed(1) + ' m';

  }

  }
  // Floating elevation tooltip — always visible while over the map

  if (tip) {
    tip.style.display = isNaN(elev) ? 'none' : 'block';

    tip.style.top  = (e.originalEvent.clientY - 10) + 'px';
  }
});

map.on('mouseout', function() {
  var tip = document.getElementById('elev-tooltip');
  if (tip) tip.style.display = 'none';
});

map.on('click', function(e) {
  if (_editActive) { _applyElevEdit(e.latlng.lat, e.latlng.lng); return; }
  if (_profMode === 0) return;
  var lat = e.latlng.lat, lon = e.latlng.lng;
  if (_profMode === 1) {
    _profPt1 = [lat, lon];
    _profMarker1 = L.circleMarker([lat, lon], {
      radius:5, color:'#2c5f2e', fillColor:'#fff', fillOpacity:1, weight:2
    }).addTo(map);
    _profMode = 2;
    _showStatus('Click point 2 on the map');
  } else if (_profMode === 2) {
    _buildProfile(_profPt1, [lat, lon]);
    _cancelProfile();
  }
});

function _niceStep(range, targetTicks) {
  var raw = range / targetTicks;
  var mag = Math.pow(10, Math.floor(Math.log(raw) / Math.LN10));
  var frac = raw / mag;
  var nice = frac < 1.5 ? 1 : frac < 3 ? 2 : frac < 7 ? 5 : 10;
  return nice * mag;
}

function _buildProfile(pt1, pt2) {
  var N = 250;
  var distances = [], elevs = [];
  var totalDist = haversineM(pt1, pt2);
  for (var i = 0; i <= N; i++) {
    var t = i / N;
    var lat = pt1[0] + (pt2[0] - pt1[0]) * t;
    var lon = pt1[1] + (pt2[1] - pt1[1]) * t;
    var d = totalDist * t;
    var e = sampleElev(lat, lon);
    distances.push(d);
    elevs.push(isNaN(e) ? null : e);
  }
  _profSamples = { distances: distances, elevs: elevs, totalDist: totalDist, pt1: pt1, pt2: pt2 };
  document.getElementById('prof-panel').style.display = 'flex';
  _drawProfile(null);
}

function _drawProfile(hoverIdx) {
  var s = _profSamples;
  if (!s) return;
  var canvas = document.getElementById('prof-canvas');
  var container = canvas.parentElement;
  var W = container.clientWidth, H = container.clientHeight;
  if (W < 10 || H < 10) { W = 600; H = 160; }
  canvas.width = W; canvas.height = H;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  var PAD = { top:18, right:12, bottom:32, left:46 };
  var cw = W - PAD.left - PAD.right;
  var ch = H - PAD.top  - PAD.bottom;

  // Find valid elevation range
  var validElevs = s.elevs.filter(function(e) { return e !== null; });
  if (validElevs.length === 0) {
    ctx.fillStyle = '#888'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('No elevation data in this area', W/2, H/2);
    return;
  }
  var eMin = Math.min.apply(null, validElevs);
  var eMax = Math.max.apply(null, validElevs);
  var eRange = eMax - eMin || 1;
  var ePad  = eRange * 0.12;
  var yLo   = eMin - ePad;
  var yHi   = eMax + ePad;

  function xPix(d) { return PAD.left + d / s.totalDist * cw; }
  function yPix(e) { return PAD.top  + ch - (e - yLo) / (yHi - yLo) * ch; }

  // Grid lines — elevation axis
  var yStep = _niceStep(yHi - yLo, 4);
  var yStart = Math.ceil(yLo / yStep) * yStep;
  ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
  ctx.font = '10px sans-serif'; ctx.textAlign = 'right'; ctx.fillStyle = '#888';
  for (var y = yStart; y <= yHi + 0.001; y += yStep) {
    var py = yPix(y);
    ctx.beginPath(); ctx.moveTo(PAD.left, py); ctx.lineTo(PAD.left + cw, py); ctx.stroke();
    ctx.fillText(Math.round(y) + 'm', PAD.left - 4, py + 3);
  }

  // X axis ticks
  var xStep = _niceStep(s.totalDist, 5);
  var xStart2 = Math.ceil(xStep / 2 / xStep) * xStep;
  ctx.textAlign = 'center'; ctx.fillStyle = '#888';
  for (var x = 0; x <= s.totalDist + 0.001; x += xStep) {
    var px2 = xPix(x);
    ctx.beginPath(); ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 1;
    ctx.moveTo(px2, PAD.top); ctx.lineTo(px2, PAD.top + ch); ctx.stroke();
    ctx.fillStyle = '#888';
    ctx.fillText(Math.round(x) + 'm', px2, PAD.top + ch + 14);
  }

  // Axes
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD.left, PAD.top); ctx.lineTo(PAD.left, PAD.top + ch);
  ctx.lineTo(PAD.left + cw, PAD.top + ch); ctx.stroke();

  // Filled terrain profile
  var grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + ch);
  grad.addColorStop(0,   'rgba(100,160,90,0.75)');
  grad.addColorStop(0.6, 'rgba(130,100,70,0.55)');
  grad.addColorStop(1,   'rgba(160,130,90,0.30)');

  ctx.beginPath();
  var started = false;
  var firstX = null, lastX = null;
  for (var i = 0; i <= 250; i++) {
    var e = s.elevs[i];
    if (e === null) { started = false; continue; }
    var px = xPix(s.distances[i]), py2 = yPix(e);
    if (!started) {
      if (firstX === null) firstX = px;
      ctx.moveTo(px, PAD.top + ch); ctx.lineTo(px, py2);
      started = true;
    } else {
      ctx.lineTo(px, py2);
    }
    lastX = px;
  }
  if (lastX !== null) { ctx.lineTo(lastX, PAD.top + ch); }
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Profile line
  ctx.beginPath(); started = false;
  ctx.strokeStyle = '#2c5f2e'; ctx.lineWidth = 1.8;
  for (var i = 0; i <= 250; i++) {
    var e = s.elevs[i];
    if (e === null) { started = false; continue; }
    var px = xPix(s.distances[i]), py2 = yPix(e);
    if (!started) { ctx.moveTo(px, py2); started = true; } else { ctx.lineTo(px, py2); }
  }
  ctx.stroke();

  // Hover crosshair
  if (hoverIdx !== null && s.elevs[hoverIdx] !== null) {
    var hx = xPix(s.distances[hoverIdx]);
    var hy = yPix(s.elevs[hoverIdx]);
    ctx.strokeStyle = 'rgba(44,95,46,0.7)'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(hx, PAD.top); ctx.lineTo(hx, PAD.top+ch); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#2c5f2e';
    ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI*2); ctx.fill();

    // Tooltip
    var tip = document.getElementById('prof-tip');
    tip.style.display = 'block';
    tip.textContent = Math.round(s.distances[hoverIdx]) + ' m  —  ' + s.elevs[hoverIdx].toFixed(1) + ' m elev';
    var tipLeft = hx + 8;
    if (tipLeft + 160 > W) tipLeft = hx - 168;
    tip.style.left = (tipLeft + 'px');
    tip.style.top  = (hy - 10 + 'px');
  } else {
    document.getElementById('prof-tip').style.display = 'none';
  }

  // Stats panel
  var rise = 0, fall = 0, prev = null;
  for (var i = 0; i <= 250; i++) {
    var e = s.elevs[i];
    if (e === null) continue;
    if (prev !== null) {
      var diff = e - prev;
      if (diff > 0) rise += diff; else fall -= diff;
    }
    prev = e;
  }
  var startE = validElevs[0], endE = validElevs[validElevs.length - 1];
  document.getElementById('prof-stats').innerHTML =
    '<b>Distance</b><br>' + Math.round(s.totalDist) + ' m<br>' +
    '<b>Start</b><br>' + startE.toFixed(1) + ' m<br>' +
    '<b>End</b><br>' + endE.toFixed(1) + ' m<br>' +
    '<b>Rise</b><br>+' + rise.toFixed(1) + ' m<br>' +
    '<b>Fall</b><br>&minus;' + fall.toFixed(1) + ' m';
}

// ── Elevation Editor ──────────────────────────────────────────────────────────
var _editActive = false;
var _editRaise  = true;
var _editAmount = 2.0;   // metres at click centre
var _editRadius = 40;    // metres, Gaussian sigma = radius/2.5
var _editHistory = [];   // undo stack (array of data snapshots)

var ElevEditControl = L.Control.extend({
  options: { position: 'topleft' },
  onAdd: function() {
    var btn = L.DomUtil.create('a', 'leaflet-bar-part');
    btn.id = 'edit-ctrl-btn';
    btn.href = '#';
    btn.title = 'Edit Elevation — raise or lower terrain by clicking';
    btn.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:14px;text-decoration:none;color:#333;width:30px;height:30px;font-weight:bold;';
    btn.textContent = '▲▼';
    var bar = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
    bar.appendChild(btn);
    L.DomEvent.disableClickPropagation(bar);
    L.DomEvent.on(btn, 'click', L.DomEvent.preventDefault);
    L.DomEvent.on(btn, 'click', function() {
      if (_editActive) { _stopElevEdit(); } else { _startElevEdit(); }
    });
    return bar;
  }
});
new ElevEditControl().addTo(map);

function _startElevEdit() {
  if (_profMode > 0) _cancelProfile();
  _editActive = true;
  map.getContainer().style.cursor = 'crosshair';
  document.getElementById('edit-panel').style.display = 'block';
  var btn = document.getElementById('edit-ctrl-btn');
  if (btn) btn.style.background = '#d4edda';
}

function _stopElevEdit() {
  _editActive = false;
  map.getContainer().style.cursor = '';
  document.getElementById('edit-panel').style.display = 'none';
  var btn = document.getElementById('edit-ctrl-btn');
  if (btn) btn.style.background = '';
}

function _setEditMode(raise) {
  _editRaise = raise;
  document.getElementById('emb-raise').classList.toggle('active',  raise);
  document.getElementById('emb-lower').classList.toggle('active', !raise);
}

function _applyElevEdit(clickLat, clickLon) {
  if (typeof elevGrid === 'undefined') return;
  var g = elevGrid;
  var sigma  = _editRadius / 2.5;
  var cutoff = _editRadius * 2.5;
  var change = _editRaise ? _editAmount : -_editAmount;

  // Snapshot for undo
  if (_editHistory.length >= 30) _editHistory.shift();
  _editHistory.push(g.data.map(function(row) { return row.slice(); }));

  for (var r = 0; r < g.rows; r++) {
    var cellLat = g.maxLat - r / (g.rows - 1) * (g.maxLat - g.minLat);
    var dy = (cellLat - clickLat) * 111320;
    if (Math.abs(dy) > cutoff) continue;
    for (var c = 0; c < g.cols; c++) {
      if (g.data[r][c] === null) continue;
      var cellLon = g.minLon + c / (g.cols - 1) * (g.maxLon - g.minLon);
      var dx = (cellLon - clickLon) * 111320 * Math.cos(clickLat * Math.PI / 180);
      var d2 = dx * dx + dy * dy;
      if (d2 > cutoff * cutoff) continue;
      var w = Math.exp(-d2 / (2 * sigma * sigma));
      g.data[r][c] = Math.round((g.data[r][c] + change * w) * 100) / 100;
    }
  }
  // Update cursor readout then rebuild contours so edits are immediately visible
  var e = sampleElev(clickLat, clickLon);
  var el = document.getElementById('edit-cursor-elev');
  if (el) el.textContent = isNaN(e) ? '—' : e.toFixed(1) + ' m';
  _rebuildContourLayer();
}

function _undoElevEdit() {
  if (!_editHistory.length) return;
  elevGrid.data = _editHistory.pop();
  _rebuildContourLayer();
}

function _exportElevGrid() {
  if (typeof elevGrid === 'undefined') return;
  var g = elevGrid;
  var lines = [
    'var elevGrid = {',
    '  minLat: ' + g.minLat + ',',
    '  maxLat: ' + g.maxLat + ',',
    '  minLon: ' + g.minLon + ',',
    '  maxLon: ' + g.maxLon + ',',
    '  rows: '   + g.rows   + ',',
    '  cols: '   + g.cols   + ',',
    '  data: ['
  ];
  for (var r = 0; r < g.rows; r++) {
    var vals = g.data[r].map(function(v) { return v === null ? 'null' : v.toFixed(2); });
    lines.push('    [' + vals.join(',') + ']' + (r < g.rows - 1 ? ',' : ''));
  }
  lines.push('  ]', '};');
  var blob = new Blob([lines.join('\n')], { type: 'application/javascript' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'elev_grid_edited.js';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── Marching squares contour rebuild ─────────────────────────────────────────
// Segment lookup: corners TL=bit3 TR=bit2 BR=bit1 BL=bit0; edges 0=top 1=right 2=bottom 3=left
var _MS = [
  [],              // 0  none
  [[3,2]],         // 1  BL
  [[2,1]],         // 2  BR
  [[3,1]],         // 3  BL+BR
  [[0,1]],         // 4  TR
  [[0,3],[1,2]],   // 5  TR+BL saddle
  [[0,2]],         // 6  TR+BR
  [[3,0]],         // 7  TR+BR+BL
  [[3,0]],         // 8  TL
  [[0,2]],         // 9  TL+BL
  [[0,1],[3,2]],   // 10 TL+BR saddle
  [[0,1]],         // 11 TL+BR+BL
  [[3,1]],         // 12 TL+TR
  [[1,2]],         // 13 TL+TR+BL
  [[3,2]],         // 14 TL+TR+BR
  []               // 15 all
];

function _msEdgePt(r, c, edge, vTL, vTR, vBR, vBL, lev) {
  var t;
  if (edge === 0) { t = (lev-vTL)/(vTR-vTL); return [r,       c+t];   }
  if (edge === 1) { t = (lev-vTR)/(vBR-vTR); return [r+t,     c+1];   }
  if (edge === 2) { t = (lev-vBR)/(vBL-vBR); return [r+1,     c+1-t]; }
                    t = (lev-vBL)/(vTL-vBL); return [r+1-t,   c];
}

function _rebuildContourLayer() {
  if (typeof elevGrid === 'undefined' || typeof contourLayer === 'undefined') return;
  contourLayer.clearLayers();
  var g = elevGrid;

  for (var lev = 30; lev <= 47; lev++) {
    var major = (lev % 5 === 0);
    var style = major
      ? { color:'#5a7a3a', weight:1.4, opacity:0.80, interactive:false }
      : { color:'#8aaa6a', weight:0.7, opacity:0.55, interactive:false };

    var coords = [];   // array of [[lon,lat],[lon,lat]] pairs → MultiLineString

    for (var r = 0; r < g.rows - 1; r++) {
      var latR  = g.maxLat - r     / (g.rows-1) * (g.maxLat-g.minLat);
      var latR1 = g.maxLat - (r+1) / (g.rows-1) * (g.maxLat-g.minLat);
      for (var c = 0; c < g.cols - 1; c++) {
        var vTL = g.data[r][c], vTR = g.data[r][c+1];
        var vBR = g.data[r+1][c+1], vBL = g.data[r+1][c];
        if (vTL===null||vTR===null||vBR===null||vBL===null) continue;
        var idx = 0;
        if (vTL >= lev) idx |= 8;
        if (vTR >= lev) idx |= 4;
        if (vBR >= lev) idx |= 2;
        if (vBL >= lev) idx |= 1;
        var cases = _MS[idx];
        for (var s = 0; s < cases.length; s++) {
          var p1g = _msEdgePt(r,c,cases[s][0],vTL,vTR,vBR,vBL,lev);
          var p2g = _msEdgePt(r,c,cases[s][1],vTL,vTR,vBR,vBL,lev);
          // Convert grid coords to [lon, lat] for GeoJSON
          var lon1 = g.minLon + p1g[1]/(g.cols-1)*(g.maxLon-g.minLon);
          var lat1 = g.maxLat - p1g[0]/(g.rows-1)*(g.maxLat-g.minLat);
          var lon2 = g.minLon + p2g[1]/(g.cols-1)*(g.maxLon-g.minLon);
          var lat2 = g.maxLat - p2g[0]/(g.rows-1)*(g.maxLat-g.minLat);
          coords.push([[lon1,lat1],[lon2,lat2]]);
        }
      }
    }

    if (!coords.length) continue;
    L.geoJSON({
      type:'Feature',
      properties:{ elevation:lev, major:major },
      geometry:{ type:'MultiLineString', coordinates:coords }
    }, { style: function() { return style; } }).addTo(contourLayer);
  }
}

// Canvas hover
document.getElementById('prof-canvas').addEventListener('mousemove', function(ev) {
  var s = _profSamples; if (!s) return;
  var rect = this.getBoundingClientRect();
  var mx = ev.clientX - rect.left;
  var PAD_LEFT = 46, PAD_RIGHT = 12;
  var cw = this.width - PAD_LEFT - PAD_RIGHT;
  var t = (mx - PAD_LEFT) / cw;
  if (t < 0 || t > 1) { _drawProfile(null); return; }
  var idx = Math.round(t * 250);
  idx = Math.max(0, Math.min(250, idx));
  _drawProfile(idx);
});
document.getElementById('prof-canvas').addEventListener('mouseleave', function() {
  _drawProfile(null);
});


function openImageLightbox() {
  var src = document.getElementById('notes-feature-img-el').src;
  var cap = document.getElementById('notes-feature-img-cap').textContent;
  if (!src) return;
  document.getElementById('img-lightbox-el').src = src;
  document.getElementById('img-lightbox-cap').textContent = cap;
  document.getElementById('img-lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeImageLightbox() {
  document.getElementById('img-lightbox').classList.remove('open');
  document.getElementById('img-lightbox-el').src = '';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeImageLightbox();
});
</script>

<div id="img-lightbox" onclick="closeImageLightbox()">
  <div id="img-lightbox-inner" onclick="event.stopPropagation()">
    <button id="img-lightbox-close" onclick="closeImageLightbox()" title="Close">&#10005;</button>
    <img id="img-lightbox-el" src="" alt="Feature view enlarged">
    <div id="img-lightbox-cap"></div>
  </div>
</div>
