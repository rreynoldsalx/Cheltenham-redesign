<style>
body { margin:0; padding:0; }
#map { width:100vw; height:100vh; }

/* Greyscale OSM tiles */
.leaflet-tile-pane {
  filter: grayscale(100%) brightness(1.08);
  -webkit-filter: grayscale(100%) brightness(1.08);
}
body.satellite .leaflet-tile-pane {
  filter: none;
  -webkit-filter: none;
}

.legend {
  background:#fff;
  padding:10px 14px;
  border-radius:6px;
  box-shadow:0 1px 5px rgba(0,0,0,0.3);
  font:12px/1.8 sans-serif;
  min-width:180px;
}
.legend h4 { margin:0 0 4px; font-size:13px; }
.legend hr { border:none; border-top:1px solid #ddd; margin:5px 0; }
.swatch { display:inline-block; width:12px; height:12px; border-radius:2px; vertical-align:middle; margin-right:4px; }

.ctip {
  background:rgba(255,255,255,0.85);
  border:none !important;
  box-shadow:none !important;
  font-size:10px;
  color:#3a5a3a;
  padding:1px 4px;
  border-radius:2px;
}

/* ── Draw panel ──────────────────────────────────────────────────────────── */
#draw-panel {
  position:fixed;
  bottom:20px;
  left:10px;
  width:310px;
  max-height:44vh;
  background:#fff;
  border-radius:8px;
  box-shadow:0 2px 12px rgba(0,0,0,0.28);
  font:12px/1.5 sans-serif;
  z-index:1000;
  display:flex;
  flex-direction:column;
}
#draw-panel-hdr {
  background:#1d3461;
  color:#fff;
  padding:7px 12px;
  border-radius:8px 8px 0 0;
  font-size:12px;
  font-weight:bold;
  letter-spacing:.3px;
}
#draw-panel-body {
  padding:8px 10px 4px;
  overflow-y:auto;
  flex:1;
}
#draw-status {
  color:#555;
  font-size:11px;
  margin-bottom:5px;
}
#draw-shapes { margin-bottom:6px; }
.draw-shape-row {
  display:flex;
  align-items:center;
  gap:4px;
  margin-bottom:3px;
}
.draw-shape-row input[type=text] {
  flex:1;
  font-size:11px;
  padding:2px 5px;
  border:1px solid #ccc;
  border-radius:3px;
}
.draw-shape-row span {
  font-size:10px;
  color:#888;
  white-space:nowrap;
}
.draw-shape-del {
  background:#c0392b;
  color:#fff;
  border:none;
  border-radius:3px;
  cursor:pointer;
  font-size:12px;
  padding:0 5px;
  line-height:1.6;
}
#draw-coords {
  width:100%;
  height:88px;
  font:9.5px/1.3 monospace;
  border:1px solid #ddd;
  border-radius:4px;
  padding:4px;
  resize:vertical;
  box-sizing:border-box;
  color:#333;
}
#draw-panel-ftr {
  padding:5px 10px 8px;
  display:flex;
  gap:5px;
}
.draw-btn {
  flex:1;
  padding:5px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:11px;
  font-weight:bold;
}
#btn-copy-draw { background:#27ae60; color:#fff; }
#btn-copy-draw:hover { background:#1e8449; }
#btn-clear-draw { background:#7f8c8d; color:#fff; }
#btn-clear-draw:hover { background:#616a6b; }

/* Loading spinner for Overpass fetch */
#loading-msg {
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.65);
  color:#fff;
  padding:5px 14px;
  border-radius:20px;
  font:12px sans-serif;
  z-index:10000;
  display:none;
}
</style>
</head>
<body>
<div id="map"></div>
<div id="loading-msg">Loading current layout from OpenStreetMap&hellip;</div>

<div id="draw-panel">
  <div id="draw-panel-hdr">&#9998; Draw Fairway Shapes</div>
  <div id="draw-panel-body">
    <div id="draw-status">Use the polygon tool (top-left toolbar) to draw shapes on the map.</div>
    <div id="draw-shapes"></div>
    <textarea id="draw-coords" placeholder="GeoJSON coordinates will appear here after drawing…" readonly></textarea>
  </div>
  <div id="draw-panel-ftr">
    <button class="draw-btn" id="btn-copy-draw" onclick="copyDrawnJSON()">Copy JSON</button>
    <button class="draw-btn" id="btn-clear-draw" onclick="clearAllDrawn()">Clear All</button>
  </div>
</div>

// ── Current layout layer (OSM golf features via Overpass) ─────────────────────
var currentLayer = L.layerGroup();   // not added by default

var GOLF_COLORS = {
  fairway: { fill:'#6db357', border:'#3a7a28', opacity:0.40 },
  green:   { fill:'#3a9e3a', border:'#1a5e1a', opacity:0.55 },
  tee:     { fill:'#c8b55a', border:'#6a5a1a', opacity:0.65 },
  bunker:  { fill:'#e8d880', border:'#9a8a20', opacity:0.70 },
  rough:   { fill:'#7aab4a', border:'#4a7a20', opacity:0.25 },
  path:    { fill:'#b0a090', border:'#705030', opacity:0.50 }
};

function styleCurrentFeat(f) {
  var g = f.properties.golf;
  var s = GOLF_COLORS[g] || { fill:'#bbb', border:'#666', opacity:0.35 };
  return {
    color:       s.border,
    weight:      1.2,
    fillColor:   s.fill,
    fillOpacity: s.opacity
  };
}

function overpassToGeoJSON(data) {
  var nodes = {};
  data.elements.forEach(function(el) {
    if (el.type === 'node') nodes[el.id] = [el.lat, el.lon];
  });

  var features = [];
  data.elements.forEach(function(el) {
    if (el.type !== 'way') return;
    var tags = el.tags || {};
    var golf = tags.golf;
    if (!golf) return;

    var coords = [];
    (el.nodes || []).forEach(function(nid) {
      var n = nodes[nid];
      if (n) coords.push([n[1], n[0]]);   // [lon, lat] for GeoJSON
    });
    if (coords.length < 3) return;

    // Ensure ring is closed
    var f0 = coords[0], fl = coords[coords.length-1];
    if (f0[0] !== fl[0] || f0[1] !== fl[1]) coords.push(f0);

    features.push({
      type: 'Feature',
      properties: {
        golf: golf,
        name: tags.name || '',
        hole: tags['golf:hole'] || tags.hole || tags.ref || ''
      },
      geometry: { type: 'Polygon', coordinates: [coords] }
    });
  });
  return { type: 'FeatureCollection', features: features };
}

// Fetch current golf features from Overpass (bbox covers the whole course)
var overpassQ = '[out:json][timeout:30][bbox:-37.9730,145.0445,-37.9638,145.0540];' +
  '(' +
  'way["golf"="fairway"];' +
  'way["golf"="green"];' +
  'way["golf"="tee"];' +
  'way["golf"="bunker"];' +
  'way["golf"="rough"];' +
  'way["golf"="path"];' +
  ');' +
  'out body;>;out skel qt;';

var loadingEl = document.getElementById('loading-msg');
loadingEl.style.display = 'block';

fetch('https://overpass.kumi.systems/api/interpreter?data=' + encodeURIComponent(overpassQ))
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    loadingEl.style.display = 'none';
    var geojson = overpassToGeoJSON(data);
    if (geojson.features.length === 0) {
      console.warn('Overpass returned 0 golf features — course may not be fully mapped in OSM');
      return;
    }
    L.geoJSON(geojson, {
      style: styleCurrentFeat,
      onEachFeature: function(f, layer) {
        var g = f.properties.golf;
        var label = g.charAt(0).toUpperCase() + g.slice(1);
        var popup = '<b>Current ' + label + '</b>';
        if (f.properties.name) popup += ': ' + f.properties.name;
        if (f.properties.hole) popup += '<br>Hole ' + f.properties.hole;
        layer.bindPopup(popup);
      }
    }).addTo(currentLayer);
    console.log('Current layout: ' + geojson.features.length + ' features loaded from OSM');
  })
  .catch(function(e) {
    loadingEl.style.display = 'none';
    console.warn('Overpass fetch failed:', e);
  });

// ── Proposed layout layer (from proposed_features.js) ────────────────────────
var proposedLayer = L.layerGroup().addTo(map);   // on by default

var PROP_STYLES = {
  fairway: { fill:'#fdd67e', border:'#c07010', opacity:0.50, weight:1.5 },
  green:   { fill:'#a8f0b8', border:'#1a8a3a', opacity:0.60, weight:2   },
  tee:     { fill:'#a8c8ff', border:'#2050c0', opacity:0.75, weight:2   },
  tree:    { fill:'#3a6e2e', border:'#1e4018', opacity:0.60, weight:1   },
  rough:   { fill:'#c8e08a', border:'#7a9840', opacity:0.40, weight:1   }
};

try {
  if (typeof proposedFeatures !== 'undefined') {
    L.geoJSON(proposedFeatures, {
      style: function(f) {
        var ft = f.properties.feature;
        var s = PROP_STYLES[ft] || { fill:'#ddd', border:'#888', opacity:0.4, weight:1 };
        return {
          color:       s.border,
          weight:      s.weight,
          fillColor:   s.fill,
          fillOpacity: s.opacity
        };
      },
      onEachFeature: function(f, layer) {
        var p = f.properties;
        var popup = '<b>Proposed — Hole ' + p.hole + ' ' + p.feature + '</b><br>' + p.label;
        layer.bindPopup(popup);
      }
    }).addTo(proposedLayer);
  }
} catch(e) { console.warn('proposed_features.js:', e); }

// ── Proposed contours ─────────────────────────────────────────────────────────
var contourLayer = L.layerGroup();

try {
  if (typeof contourData !== 'undefined') {
    L.geoJSON(contourData, {
      style: function(f) {
        return {
          color:   f.properties.major ? '#4a7a4a' : '#7aaa7a',
          weight:  f.properties.major ? 1.5 : 0.7,
          opacity: f.properties.major ? 0.80 : 0.45
        };
      },
      onEachFeature: function(f, layer) {

          layer.bindTooltip(f.properties.elevation + 'm', {sticky:true, className:'ctip'});

} catch(e) { console.warn('contour_data.js:', e); }

// ── H7 Shot Dispersion Cone ───────────────────────────────────────────────────
var dispersionLayer = L.layerGroup();

(function () {
  var TEE     = [-37.969972, 145.050500];
  var WP      = [-37.968306, 145.050139];
  var cos_lat = Math.cos(TEE[0] * Math.PI / 180);

  // Bearing from tee toward waypoint (radians, clockwise from north)
  var dlat_m = (WP[0] - TEE[0]) * 111000;
  var dlon_m = (WP[1] - TEE[1]) * 111000 * cos_lat;
  var brg    = Math.atan2(dlon_m, dlat_m);   // atan2(east, north) → clockwise-from-north

  // Return a Leaflet [lat,lon] point at dist_m from TEE along (brg + offset_deg)
  function pt(dist_m, offset_deg) {
    var a = brg + offset_deg * Math.PI / 180;
    return [
      TEE[0] + dist_m * Math.cos(a) / 111000,
      TEE[1] + dist_m * Math.sin(a) / (111000 * cos_lat)
    ];
  }

  // Dispersion model: half-width at distance d = d × k
  //   1σ ≈ 10 % of carry → half-angle₁ = atan(0.10) ≈ 5.7°
  //   2σ ≈ 20 % of carry → half-angle₂ = atan(0.20) ≈ 11.3°
  var HA1 = Math.atan(0.10) * 180 / Math.PI;
  var HA2 = Math.atan(0.20) * 180 / Math.PI;
  var MAX_D = 250;
  var N_EDGE = 60;

  function coneRing(half_deg) {
    var left = [], right = [];
    for (var i = 0; i <= N_EDGE; i++) {
      var d = MAX_D * i / N_EDGE;
      left.push(pt(d, -half_deg));
      right.push(pt(d,  half_deg));
    }
    return left.concat(right.slice().reverse());
  }

  // Outer zone: ±2σ (95 % of shots)
  L.polygon(coneRing(HA2), {
    color: '#b83010', weight: 1.5, dashArray: '6 4',
    fillColor: '#e04818', fillOpacity: 0.10,
    interactive: false
  }).addTo(dispersionLayer);

  // Inner zone: ±1σ (68 % of shots) — darker overlay on top
  L.polygon(coneRing(HA1), {
    color: 'none', weight: 0,
    fillColor: '#e04818', fillOpacity: 0.14,
    interactive: false
  }).addTo(dispersionLayer);

  // Centre-line (aim direction)
  L.polyline([TEE, pt(MAX_D, 0)], {
    color: '#b83010', weight: 1, opacity: 0.35,
    dashArray: '2 7', interactive: false
  }).addTo(dispersionLayer);

  // Arc lines at 150 m, 200 m, 250 m — true circular arcs centred on tee
  [150, 200, 250].forEach(function (d) {
    var arcPts = [];
    for (var j = 0; j <= 50; j++) {
      arcPts.push(pt(d, -HA2 + 2 * HA2 * j / 50));
    }
    L.polyline(arcPts, {
      color: '#b83010', weight: 1.5, opacity: 0.70,
      interactive: false
    }).addTo(dispersionLayer);

    // Label just outside the right edge of the outer cone
    L.marker(pt(d, HA2 + 2.0), {
      icon: L.divIcon({
        className: '',
        html: '<div style="font:bold 10px/1.4 sans-serif;color:#a02808;' +
              'background:rgba(255,255,255,0.88);padding:1px 5px;' +
              'border-radius:3px;white-space:nowrap;' +
              'border:1px solid rgba(160,40,8,0.25)">' + d + ' m</div>',
        iconAnchor: [0, 8]
      }),
      interactive: false
    }).addTo(dispersionLayer);
  });

  // Label at the tee
  L.marker(TEE, {
    icon: L.divIcon({
      className: '',
      html: '<div style="font:bold 9px/1.3 sans-serif;color:#a02808;' +
            'background:rgba(255,255,255,0.88);padding:1px 5px;' +
            'border-radius:3px;white-space:nowrap;margin-top:4px">' +
            'H7 Tee<br><span style="font-weight:normal">~10% lateral / σ</span></div>',
      iconAnchor: [20, -4]
    }),
    interactive: false
  }).addTo(dispersionLayer);

})();

// ── Layer control ─────────────────────────────────────────────────────────────
var overlays = {

};

L.control.layers(

// ── Legend ────────────────────────────────────────────────────────────────────
var leg = L.control({position:'bottomright'});

    '&ensp;<span class="swatch" style="background:#fdd67e;border:1.5px solid #c07010"></span> New fairway' +
    '&ensp;<span class="swatch" style="background:#a8f0b8;border:2px solid #1a8a3a"></span> New green' +
    '<br><span class="swatch" style="background:#3a6e2e;border:1px solid #1e4018"></span> Tree cover' +
    '&ensp;<span class="swatch" style="background:#c8e08a;border:1px solid #7a9840"></span> Rough / runoff' +
    '<br><small style="color:#777">Unchanged areas shown in <i>Current layout</i> layer only</small><hr>' +
    '<b>Current layout (OSM)</b><br>' +
    '<span class="swatch" style="background:#6db357;border:1px solid #3a7a28"></span> Fairway' +
    '&ensp;<span class="swatch" style="background:#3a9e3a;border:1px solid #1a5e1a"></span> Green' +
    '&ensp;<span class="swatch" style="background:#c8b55a;border:1px solid #6a5a1a"></span> Tee<hr>' +
    '<span style="color:#e67e00;font-weight:bold">&#9644;</span> H5' +
    '&ensp;<span style="color:#c0392b;font-weight:bold">&#9644;</span> H6' +
    '&ensp;<span style="color:#2980b9;font-weight:bold">&#9644;</span> H7' +
    '&ensp;<span style="color:#999">&#8212;</span> Existing<hr>' +
    '<small style="color:#888">Toggle layers top-right &bull; Click features for info</small>';
  return d;
};
leg.addTo(map);

map.fitBounds([[-37.9723,145.0470],[-37.9670,145.0518]], {padding:[50,50]});

// ── Draw tool ─────────────────────────────────────────────────────────────────
var drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

var drawControl = new L.Control.Draw({
  position: 'topleft',
  draw: {
    polygon: {
      allowIntersection: false,
      showArea: true,
      shapeOptions: {
        color:       '#c0392b',
        weight:      2,
        fillColor:   '#c0392b',
        fillOpacity: 0.12,
        dashArray:   '6 4'
      }
    },
    polyline:     false,
    rectangle:    false,
    circle:       false,
    circlemarker: false,
    marker:       false
  },
  edit: {
    featureGroup: drawnItems,
    remove: false
  }
});
map.addControl(drawControl);

var drawnShapes = [];
var shapeCounter = 0;

map.on(L.Draw.Event.CREATED, function(e) {
  var layer = e.layer;
  drawnItems.addLayer(layer);
  shapeCounter++;
  var id = shapeCounter;
  var geojson = layer.toGeoJSON();
  geojson.properties.name = 'Shape ' + id;
  drawnShapes.push({ id: id, name: 'Shape ' + id, layer: layer, geojson: geojson });
  refreshDrawPanel();
});

function deleteShape(id) {
  var idx = -1;
  for (var i = 0; i < drawnShapes.length; i++) {
    if (drawnShapes[i].id === id) { idx = i; break; }
  }
  if (idx === -1) return;
  drawnItems.removeLayer(drawnShapes[idx].layer);
  drawnShapes.splice(idx, 1);
  refreshDrawPanel();
}

function clearAllDrawn() {
  drawnItems.clearLayers();
  drawnShapes = [];
  refreshDrawPanel();
}

function refreshDrawPanel() {
  var shapesDiv = document.getElementById('draw-shapes');
  var status    = document.getElementById('draw-status');
  var textarea  = document.getElementById('draw-coords');

  if (drawnShapes.length === 0) {
    status.textContent = 'Use the polygon tool (top-left toolbar) to draw shapes on the map.';
    shapesDiv.innerHTML = '';
    textarea.value = '';
    return;
  }

  status.textContent = drawnShapes.length + ' shape' + (drawnShapes.length > 1 ? 's' : '') + ' drawn. Name each shape, then Copy JSON.';
  shapesDiv.innerHTML = '';

  drawnShapes.forEach(function(s) {
    var row = document.createElement('div');
    row.className = 'draw-shape-row';

    var inp = document.createElement('input');
    inp.type = 'text';
    inp.value = s.name;
    inp.placeholder = 'Shape name (e.g. H6 Fairway)';
    (function(shape, input) {
      input.addEventListener('input', function() {
        shape.name = input.value;
        shape.geojson.properties.name = input.value;
        updateDrawTextarea();
      });
    })(s, inp);

    var pts = document.createElement('span');
    pts.textContent = (s.geojson.geometry.coordinates[0].length - 1) + ' pts';

    var del = document.createElement('button');
    del.className = 'draw-shape-del';
    del.textContent = '×';
    del.title = 'Delete this shape';
    (function(sid) {
      del.addEventListener('click', function() { deleteShape(sid); });
    })(s.id);

    row.appendChild(inp);
    row.appendChild(pts);
    row.appendChild(del);
    shapesDiv.appendChild(row);
  });

  updateDrawTextarea();
}

function updateDrawTextarea() {
  var fc = {
    type: 'FeatureCollection',
    features: drawnShapes.map(function(s) { return s.geojson; })
  };
  document.getElementById('draw-coords').value = JSON.stringify(fc, null, 2);
}

function copyDrawnJSON() {
  var textarea = document.getElementById('draw-coords');
  if (!textarea.value) return;
  var btn = document.getElementById('btn-copy-draw');
  function flash() {
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy JSON'; }, 2000);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(textarea.value).then(flash).catch(function() {
      textarea.select(); document.execCommand('copy'); flash();
    });
  } else {
    textarea.select(); document.execCommand('copy'); flash();
  }
}
